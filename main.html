<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loot Collection Tracker Pro</title>
    <style>
        :root {
            --bg: #121212;
            --card-bg: #1e1e1e;
            --text: #e0e0e0;
            --accent: #f39c12;
            --satanic: #e74c3c;
            --heroic: #9b59b6;
            --border: #333;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1100px; margin: 0 auto; }

        header { text-align: center; margin-bottom: 30px; }

        /* Progress Dashboard */
        .progress-dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
            margin-bottom: 30px;
            background: #181818;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .category-stat {
            background: var(--card-bg);
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .category-stat:hover {
            border-color: var(--accent);
            background: #252525;
        }

        .category-stat.active {
            border-color: var(--accent);
            background: #2c2112; /* Subtle orange tint */
            box-shadow: inset 0 0 10px rgba(243, 156, 18, 0.2);
        }

        .category-stat .name { font-size: 0.8rem; display: block; margin-bottom: 5px; opacity: 0.7; }
        .category-stat .percent { font-size: 1.1rem; font-weight: bold; color: var(--accent); }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            position: sticky;
            top: 10px;
            z-index: 10;
            background: var(--bg);
            padding: 10px 0;
        }

        input, select {
            padding: 12px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: white;
            border-radius: 6px;
        }

        #searchInput { flex: 2; }
        .filter-group { flex: 1; display: flex; gap: 5px; }

        .item-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }

        .item-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid var(--border);
            transition: all 0.2s;
        }

        .item-card.acquired { opacity: 0.6; border-color: #2ecc71; background: #1a251e; }
        .item-card.Satanic { border-left: 4px solid var(--satanic); }
        .item-card.Heroic { border-left: 4px solid var(--heroic); }

        .item-info h3 { margin: 0; font-size: 1rem; }
        .meta { font-size: 0.8rem; opacity: 0.6; margin-top: 4px; }

        input[type="checkbox"] {
            width: 22px;
            height: 22px;
            accent-color: #2ecc71;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Item Collection Tracker</h1>
    </header>

    <div id="progressDashboard" class="progress-dashboard"></div>

    <div class="controls">
        <input type="text" id="searchInput" placeholder="Search items...">
        <div class="filter-group">
            <select id="typeFilter"><option value="all">All Types</option></select>
            <select id="statusFilter">
                <option value="all">All Status</option>
                <option value="missing">Missing Only</option>
                <option value="acquired">Acquired Only</option>
            </select>
        </div>
    </div>

    <div class="item-grid" id="itemGrid"></div>
</div>

<script src="scripts.js" type="module"></script>
</body>
</html>
